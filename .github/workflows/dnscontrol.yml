name: DNSControl

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      apply:
        description: "Run dnscontrol push instead of preview"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  check:
    name: Check config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: DNSControl check
        run: mise run check

  preview:
    name: Preview Cloudflare changes
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Check credentials
        id: creds
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::Cloudflare secrets are not configured; skipping preview."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: DNSControl preview
        if: steps.creds.outputs.available == 'true' && github.event.inputs.apply != 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise exec -- dnscontrol preview --creds creds.env.json

      - name: DNSControl push
        if: steps.creds.outputs.available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise exec -- dnscontrol push --creds creds.env.json
